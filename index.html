                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) this.loadReport(code);
            },

            startQuiz(lessonId) {
                this.state.lessonId = lessonId;
                this.resetState();
                
                let questions = questionBank.filter(q =&gt; q.lesson === lessonId);
                this.state.currentQuiz = this.shuffleArray(questions);
                this.showView('view-quiz');
                this.updateProgress();
                this.renderQuestion();
            },

            resetState() {
                this.state.score = 0;
                this.state.currentIndex = 0;
                this.state.answers = [];
                document.getElementById('nav-score').textContent = 0;
            },

            showView(viewId) {
                ['view-home', 'view-quiz', 'view-results', 'view-teacher'].forEach(id =&gt; {
                    document.getElementById(id).classList.add('hidden');
                });
                document.getElementById(viewId).classList.remove('hidden');
                window.scrollTo(0, 0);
            },

            renderQuestion() {
                const q = this.state.currentQuiz[this.state.currentIndex];
                
                document.getElementById('q-current').textContent = this.state.currentIndex + 1;
                document.getElementById('q-total').textContent = this.state.currentQuiz.length;
                document.getElementById('q-tag').textContent = q.type.toUpperCase();
                document.getElementById('q-text').innerHTML = q.q;
                
                document.getElementById('btn-prev').disabled = this.state.currentIndex === 0;
                document.getElementById('feedback').classList.add('hidden');
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                const shuffledOpts = this.shuffleArray([...q.opts]);
                
                shuffledOpts.forEach(opt =&gt; {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full p-5 text-left rounded-xl bg-slate-800/50 border border-slate-700 text-lg font-medium text-slate-300 shadow-sm';
                    btn.textContent = opt;
                    btn.onclick = () =&gt; this.checkAnswer(opt, btn);
                    container.appendChild(btn);
                });
            },

            checkAnswer(selected, btn) {
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b =&gt; b.disabled = true);

                const q = this.state.currentQuiz[this.state.currentIndex];
                const isCorrect = selected === q.a;

                btn.classList.add('selected');
                if (isCorrect) {
                    btn.classList.add('correct');
                    this.state.score++;
                    this.triggerConfetti();
                    this.showFeedback(true, q.exp);
                } else {
                    btn.classList.add('wrong');
                    buttons.forEach(b =&gt; {
                        if (b.textContent === q.a) b.classList.add('correct');
                    });
                    this.showFeedback(false, q.exp);
                }

                this.state.answers.push({
                    id: q.id,
                    correct: isCorrect,
                    studentAnswer: selected,
                    correctAnswer: q.a,
                    question: q.q
                });

                document.getElementById('nav-score').textContent = this.state.score;
            },

            showFeedback(isCorrect, explanation) {
                const fb = document.getElementById('feedback');
                const icon = document.getElementById('feedback-icon');
                const title = document.getElementById('feedback-title');
                const text = document.getElementById('feedback-text');

                fb.classList.remove('hidden');
                if (isCorrect) {
                    fb.className = 'mt-8 p-6 rounded-xl bg-emerald-900/20 border border-emerald-500/30 animate-fade';
                    icon.textContent = '✨';
                    title.textContent = 'Excellent!';
                    title.className = 'text-lg font-bold mb-2 text-emerald-400';
                } else {
                    fb.className = 'mt-8 p-6 rounded-xl bg-rose-900/20 border border-rose-500/30 animate-fade';
                    icon.textContent = '💡';
                    title.textContent = 'Learning Moment';
                    title.className = 'text-lg font-bold mb-2 text-rose-400';
                }
                text.innerHTML = explanation;
            },

            prevQuestion() {
                if (this.state.currentIndex &gt; 0) {
                    this.state.currentIndex--;
                    this.state.answers.pop();
                    if (this.state.answers.length &lt; this.state.score) this.state.score--;
                    document.getElementById('nav-score').textContent = this.state.score;
                    
                    this.updateProgress();
                    this.renderQuestion();
                }
            },

            nextQuestion() {
                this.state.currentIndex++;
                this.updateProgress();
                if (this.state.currentIndex &lt; this.state.currentQuiz.length) {
                    this.renderQuestion();
                } else {
                    this.showResults();
                }
            },

            updateProgress() {
                const percent = (this.state.currentIndex / this.state.currentQuiz.length) * 100;
                document.getElementById('progress-bar').style.width = `${percent}%`;
            },

            showResults() {
                this.showView('view-results');
                const total = this.state.currentQuiz.length;
                const percent = Math.round((this.state.score / total) * 100);
                
                this.animateValue('result-score', 0, percent, 1000);
                document.getElementById('result-correct').textContent = this.state.score;
                document.getElementById('result-total').textContent = total;
                
                if (percent &gt;= 80) this.triggerConfetti();
            },

            generateReport() {
                const report = {
                    date: new Date().toISOString(),
                    lesson: this.state.lessonId,
                    score: this.state.score,
                    total: this.state.currentQuiz.length,
                    answers: this.state.answers
                };
                const code = btoa(JSON.stringify(report));
                document.getElementById('submit-code').textContent = code;
                
                const subject = `Word Roots L2 Report - ${new Date().toLocaleDateString()}`;
                const body = `Here is my progress report code:\n\n${code}\n\nPlease paste this into the Teacher Portal.`;
                document.getElementById('btn-email').href = `mailto:?subject=${encodeURIComponent(subject)}&amp;body=${encodeURIComponent(body)}`;
                
                document.getElementById('modal-submit').classList.remove('hidden');
            },

            showTeacherModal() {
                document.getElementById('teacher-input').value = '';
                document.getElementById('modal-teacher').classList.remove('hidden');
            },

            loadFromInput() {
                const code = document.getElementById('teacher-input').value.trim();
                if (code) {
                    this.loadReport(code);
                    document.getElementById('modal-teacher').classList.add('hidden');
                }
            },

            copyCode() {
                const code = document.getElementById('submit-code').textContent;
                navigator.clipboard.writeText(code).then(() =&gt; alert('Code copied!'));
            },

            loadReport(code) {
                try {
                    const data = JSON.parse(atob(code));
                    this.renderTeacherView(data);
                } catch (e) {
                    alert(&quot;Invalid code.&quot;);
                }
            },

            renderTeacherView(data) {
                this.showView('view-teacher');
                
                const percent = Math.round((data.score / data.total) * 100);
                
                let html = `
                    &lt;div class=&quot;grid grid-cols-1 md:grid-cols-3 gap-4 mb-8&quot;&gt;
                        &lt;div class=&quot;bg-slate-800 p-5 rounded-2xl border border-slate-700&quot;&gt;
                            &lt;div class=&quot;text-xs text-slate-500 uppercase font-bold&quot;&gt;Module&lt;/div&gt;
                            &lt;div class=&quot;text-2xl font-bold text-white&quot;&gt;${data.lesson}&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;bg-slate-800 p-5 rounded-2xl border border-slate-700&quot;&gt;
                            &lt;div class=&quot;text-xs text-slate-500 uppercase font-bold&quot;&gt;Score&lt;/div&gt;
                            &lt;div class=&quot;text-2xl font-bold ${percent &gt;= 80 ? 'text-emerald-400' : 'text-amber-400'}&quot;&gt;${percent}%&lt;/div&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;bg-slate-800 p-5 rounded-2xl border border-slate-700&quot;&gt;
                            &lt;div class=&quot;text-xs text-slate-500 uppercase font-bold&quot;&gt;Date&lt;/div&gt;
                            &lt;div class=&quot;text-xl font-bold text-white&quot;&gt;${new Date(data.date).toLocaleDateString()}&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;h3 class=&quot;font-bold text-xl text-white mb-4&quot;&gt;Detailed Analysis&lt;/h3&gt;
                    &lt;div class=&quot;space-y-4&quot;&gt;
                `;

                data.answers.forEach((ans, idx) =&gt; {
                    html += `
                        &lt;div class=&quot;p-5 rounded-2xl border ${ans.correct ? 'border-emerald-500/30 bg-emerald-900/10' : 'border-rose-500/30 bg-rose-900/10'}&quot;&gt;
                            &lt;div class=&quot;flex justify-between mb-2&quot;&gt;
                                &lt;span class=&quot;font-bold text-sm text-slate-400&quot;&gt;Q${idx + 1}&lt;/span&gt;
                                &lt;span class=&quot;text-sm font-bold ${ans.correct ? 'text-emerald-400' : 'text-rose-400'}&quot;&gt;${ans.correct ? 'Correct' : 'Incorrect'}&lt;/span&gt;
                            &lt;/div&gt;
                            &lt;p class=&quot;text-slate-200 text-lg font-medium mb-3&quot;&gt;${ans.question}&lt;/p&gt;
                            &lt;div class=&quot;text-sm text-slate-400&quot;&gt;
                                Student: &lt;span class=&quot;font-bold ${ans.correct ? 'text-emerald-400' : 'text-rose-400'}&quot;&gt;${ans.studentAnswer}&lt;/span&gt;
                                ${!ans.correct ? `&lt;br&gt;Correct: &lt;span class=&quot;font-bold text-emerald-400&quot;&gt;${ans.correctAnswer}&lt;/span&gt;` : ''}
                            &lt;/div&gt;
                        &lt;/div&gt;
                    `;
                });

                html += '&lt;/div&gt;';
                document.getElementById('report-content').innerHTML = html;
            },

            shuffleArray(array) {
                for (let i = array.length - 1; i &gt; 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            },

            triggerConfetti() {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#8b5cf6', '#d946ef', '#f59e0b']
                });
            },

            animateValue(id, start, end, duration) {
                const obj = document.getElementById(id);
                let startTimestamp = null;
                const step = (timestamp) =&gt; {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start);
                    if (progress &lt; 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            },

            clearProgress() {
                if(confirm('Reset all progress?')) {
                    this.resetState();
                    this.showView('view-home');
                }
            },

            goHome() {
                this.showView('view-home');
            }
        };

        app.init();
    &lt;/script&gt;
 &lt;/body&gt;
&lt;/html&gt;" frameborder="0">

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
